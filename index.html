<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avslutningsskjerm</title>
  <style>
    :root {
      --bg1: #172033;
      --bg2: #263852;
      --card: rgba(255, 255, 255, 0.12);
      --card-strong: rgba(255, 255, 255, 0.19);
      --text: #f7fafc;
      --muted: #d9e2ec;
      --accent: #ffd166;
      --accent2: #7bdff2;
      --success: #9ef01a;
      --warning: #ffb703;
      --danger: #ff6b6b;
      --shadow: rgba(0, 0, 0, 0.25);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top left, #34506e, var(--bg1) 45%, #101827);
      color: var(--text);
    }

    .app {
      width: 100vw;
      height: 100vh;
      padding: clamp(10px, 1.2vw, 20px);
      display: grid;
      grid-template-rows: auto 1fr;
      gap: clamp(10px, 1vw, 16px);
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 14px;
    }

    .title-block h1 {
      margin: 0;
      font-size: clamp(2rem, 3.2vw, 3.7rem);
      line-height: 0.95;
      letter-spacing: -0.04em;
    }

    .title-block p {
      margin: 5px 0 0;
      font-size: clamp(0.95rem, 1.25vw, 1.25rem);
      color: var(--muted);
    }

    .top-controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 6px;
      max-width: 520px;
    }

    button, input, textarea {
      font: inherit;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 9px 14px;
      background: var(--card-strong);
      color: var(--text);
      cursor: pointer;
      box-shadow: 0 6px 18px var(--shadow);
      transition: transform 0.15s ease, background 0.15s ease;
      backdrop-filter: blur(10px);
      font-weight: 700;
      font-size: clamp(0.85rem, 0.9vw, 1rem);
    }

    button:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.24);
    }

    button.primary {
      background: var(--accent);
      color: #1f2933;
      font-weight: 900;
    }

    button.active-mode {
      outline: 3px solid var(--accent);
      background: rgba(255, 255, 255, 0.28);
    }

    main {
      min-height: 0;
      display: grid;
      grid-template-columns: 0.95fr 1.05fr;
      gap: clamp(10px, 1.2vw, 18px);
      align-items: stretch;
    }

    .panel {
      min-height: 0;
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: clamp(18px, 2vw, 30px);
      padding: clamp(14px, 1.4vw, 24px);
      box-shadow: 0 14px 36px var(--shadow);
      backdrop-filter: blur(18px);
    }

    .timer-panel {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
    }

    .timer-label {
      font-size: clamp(1.1rem, 1.8vw, 2rem);
      color: var(--muted);
      margin-bottom: 8px;
      font-weight: 700;
    }

    .timer {
      font-size: clamp(6rem, 14vw, 15rem);
      line-height: 0.88;
      font-weight: 950;
      letter-spacing: -0.08em;
      text-shadow: 0 14px 34px rgba(0, 0, 0, 0.25);
    }

    .timer.warning {
      color: var(--warning);
    }

    .timer.done {
      color: var(--success);
    }

    .progress-wrap {
      width: min(680px, 92%);
      height: clamp(16px, 1.7vw, 24px);
      background: rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      overflow: hidden;
      margin: clamp(16px, 2vw, 28px) 0 clamp(10px, 1vw, 16px);
    }

    .progress-bar {
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      border-radius: 999px;
      transition: width 0.35s linear;
    }

    .timer-message {
      font-size: clamp(1.45rem, 2.7vw, 3rem);
      font-weight: 900;
      margin-top: 4px;
      line-height: 1.05;
    }

    .timer-submessage {
      font-size: clamp(1rem, 1.35vw, 1.35rem);
      color: var(--muted);
      margin-top: 8px;
      max-width: 700px;
      line-height: 1.25;
    }

    .right-grid {
      min-height: 0;
      display: grid;
      grid-template-rows: auto 210px 1fr;
      gap: clamp(10px, 1vw, 14px);
    }

    .mode-card h2, .checklist-card h2, .message-card h2, .finished-card h2 {
      margin: 0 0 10px;
      font-size: clamp(1.25rem, 1.9vw, 2.1rem);
      line-height: 1;
    }

    .mode-card {
      padding: clamp(8px, 0.8vw, 14px);
    }

    .mode-card h2 {
      font-size: clamp(0.85rem, 1vw, 1.05rem);
      margin-bottom: 6px;
      color: var(--muted);
    }

    .message-card {
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .message-card h2 {
      font-size: clamp(1.6rem, 2.5vw, 2.8rem);
      flex: 0 0 auto;
    }

    .modes {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .mode-btn {
      border-radius: 14px;
      padding: 7px 8px;
      text-align: center;
      min-height: 42px;
      box-shadow: none;
    }

    .mode-btn strong {
      display: block;
      font-size: clamp(0.75rem, 0.85vw, 0.92rem);
      margin-bottom: 0;
      white-space: nowrap;
    }

    .mode-btn span {
      color: var(--muted);
      font-size: clamp(0.65rem, 0.72vw, 0.78rem);
    }

    textarea {
      width: 100%;
      flex: 1 1 auto;
      min-height: 0;
      height: auto;
      max-height: 100%;
      border: 0;
      border-radius: 16px;
      padding: 12px 14px;
      color: var(--text);
      background: rgba(0, 0, 0, 0.18);
      resize: none;
      font-weight: 800;
      line-height: 1.2;
      outline: 2px solid transparent;
      font-size: clamp(1.4rem, 2.1vw, 2.4rem);
    }

    textarea:focus {
      outline-color: var(--accent);
    }

    .checklist-card {
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .checklist {
      min-height: 0;
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: clamp(8px, 0.8vw, 12px);
    }

    .check-item {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      align-items: center;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 18px;
      padding: clamp(10px, 1vw, 14px);
      min-height: 78px;
    }

    .icon {
      font-size: clamp(1.8rem, 2.2vw, 2.4rem);
      line-height: 1;
    }

    .check-item strong {
      display: block;
      font-size: clamp(1rem, 1.35vw, 1.45rem);
      margin-bottom: 2px;
      line-height: 1.05;
    }

    .check-item span {
      color: var(--muted);
      font-size: clamp(0.78rem, 0.95vw, 1.02rem);
      line-height: 1.18;
      display: block;
    }

    .finished-card {
      display: none;
      text-align: center;
      background: linear-gradient(135deg, rgba(158, 240, 26, 0.18), rgba(123, 223, 242, 0.16));
    }

    .finished-card.visible {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .finished-card .big {
      font-size: clamp(2rem, 4vw, 4.8rem);
      font-weight: 950;
      line-height: 0.95;
      margin: 8px 0 10px;
    }

    .finished-card p {
      margin: 0;
      font-size: clamp(1rem, 1.4vw, 1.4rem);
      color: var(--muted);
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 1100px) {
      html, body {
        overflow: auto;
      }

      .app {
        height: auto;
        min-height: 100vh;
      }

      header {
        grid-template-columns: 1fr;
      }

      .top-controls {
        justify-content: flex-start;
        max-width: none;
      }

      main {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="title-block">
        <h1>Avslutning av timen</h1>
        <p>Rydd plassen, pakk sekken, sjekk lekser og gjør deg klar.</p>
      </div>

      <div class="top-controls" aria-label="Kontroller">
        <button class="primary" id="startBtn">Start</button>
        <button id="pauseBtn">Pause</button>
        <button id="resetBtn">Nullstill</button>
        <button id="fullscreenBtn">Fullskjerm</button>
        <button id="soundBtn">Lyd på</button>
      </div>
    </header>

    <main>
      <section class="panel timer-panel" aria-live="polite">
        <div class="timer-label" id="timerLabel">Du har 3 minutter</div>
        <div class="timer" id="timer">03:00</div>
        <div class="progress-wrap" aria-hidden="true">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="timer-message" id="timerMessage">Gjør deg klar.</div>
        <div class="timer-submessage" id="timerSubmessage">Når du er ferdig: stå rolig bak pulten.</div>
      </section>

      <section class="right-grid">
        <div class="panel mode-card">
          <h2>Modus</h2>
          <div class="modes">
            <button class="mode-btn" data-mode="quick">
              <strong>Rask</strong>
              <span>1 min</span>
            </button>
            <button class="mode-btn active-mode" data-mode="normal">
              <strong>Vanlig</strong>
              <span>3 min</span>
            </button>
            <button class="mode-btn" data-mode="careful">
              <strong>Ekstra nøye</strong>
              <span>5 min</span>
            </button>
          </div>
        </div>

        <div class="panel message-card">
          <h2>Beskjed</h2>
          <textarea id="messageInput" placeholder="Skriv beskjed her..."></textarea>
        </div>

        <div class="panel checklist-card" id="checklistCard">
          <h2>Sjekkliste</h2>
          <ul class="checklist" id="checklist"></ul>
        </div>

        <div class="panel finished-card" id="finishedCard">
          <h2>Tiden er ute</h2>
          <div class="big">Stå klar bak pulten</div>
          <p>Takk for i dag!</p>
        </div>
      </section>
    </main>
  </div>

  <script>
    const modes = {
      quick: {
        seconds: 60,
        label: "Du har 1 minutt",
        checklist: [
          ["🎒", "Pakk sekken", "Ta med det viktigste."],
          ["📚", "Sjekk lekser", "Se etter beskjeder."],
          ["🧹", "Rydd", "Sjekk pult og gulv."],
          ["🙋", "Stå klar", "Vent rolig."]
        ]
      },
      normal: {
        seconds: 180,
        label: "Du har 3 minutter",
        checklist: [
          ["🧹", "Rydd pulten", "På, under og rundt pulten."],
          ["🎒", "Pakk sekken", "Ta med det du trenger hjem."],
          ["📚", "Sjekk lekser", "Se etter lekser, frister og prøver."],
          ["💻", "Mac/iPad", "Husk enhet og lader."],
          ["🪑", "Stol", "Sett opp eller inn stolen."],
          ["🙋", "Stå klar", "Vent rolig bak pulten."]
        ]
      },
      careful: {
        seconds: 300,
        label: "Du har 5 minutter",
        checklist: [
          ["🧹", "Rydd pulten", "Alt skal på riktig plass."],
          ["🔎", "Sjekk gulvet", "Under og rundt pulten."],
          ["📦", "Utstyr", "Legg fellesutstyr tilbake."],
          ["🎒", "Pakk sekken", "Ta med det du trenger hjem."],
          ["📚", "Sjekk lekser", "Lekser, prøver og frister."],
          ["🧺", "Hylle/skap", "Klær, flasker og utstyr."],
          ["🪑", "Stol", "Sett opp eller inn stolen."],
          ["🙋", "Stå klar", "Vent rolig bak pulten."]
        ]
      }
    };

    const timerEl = document.getElementById("timer");
    const timerLabelEl = document.getElementById("timerLabel");
    const timerMessageEl = document.getElementById("timerMessage");
    const timerSubmessageEl = document.getElementById("timerSubmessage");
    const progressBar = document.getElementById("progressBar");
    const checklistEl = document.getElementById("checklist");
    const modeButtons = document.querySelectorAll(".mode-btn");
    const startBtn = document.getElementById("startBtn");
    const pauseBtn = document.getElementById("pauseBtn");
    const resetBtn = document.getElementById("resetBtn");
    const fullscreenBtn = document.getElementById("fullscreenBtn");
    const soundBtn = document.getElementById("soundBtn");
    const messageInput = document.getElementById("messageInput");
        const finishedCard = document.getElementById("finishedCard");
    const checklistCard = document.getElementById("checklistCard");

    let currentMode = "normal";
    let totalSeconds = modes[currentMode].seconds;
    let remainingSeconds = totalSeconds;
    let intervalId = null;
    let soundOn = true;
    let audioContext = null;

    function formatTime(seconds) {
      const minutes = Math.floor(seconds / 60);
      const rest = seconds % 60;
      return `${String(minutes).padStart(2, "0")}:${String(rest).padStart(2, "0")}`;
    }

    function renderChecklist() {
      checklistEl.innerHTML = "";
      modes[currentMode].checklist.forEach(([icon, title, text]) => {
        const li = document.createElement("li");
        li.className = "check-item";
        li.innerHTML = `
          <div class="icon">${icon}</div>
          <div><strong>${title}</strong><span>${text}</span></div>
        `;
        checklistEl.appendChild(li);
      });
    }

    function renderTimer() {
      timerEl.textContent = formatTime(remainingSeconds);
      const percent = Math.max(0, (remainingSeconds / totalSeconds) * 100);
      progressBar.style.width = `${percent}%`;
      timerEl.classList.toggle("warning", remainingSeconds <= 30 && remainingSeconds > 0);
      timerEl.classList.toggle("done", remainingSeconds === 0);
    }

    function setMode(mode) {
      stopTimer();
      currentMode = mode;
      totalSeconds = modes[mode].seconds;
      remainingSeconds = totalSeconds;
      timerLabelEl.textContent = modes[mode].label;
      timerMessageEl.textContent = "Gjør deg klar.";
      timerSubmessageEl.textContent = "Når du er ferdig: stå rolig bak pulten.";
      finishedCard.classList.remove("visible");
      checklistCard.classList.remove("hidden");

      modeButtons.forEach(btn => {
        btn.classList.toggle("active-mode", btn.dataset.mode === mode);
      });

      renderChecklist();
      renderTimer();
    }

    function startTimer() {
      unlockAudio();
      if (intervalId) return;

      if (remainingSeconds === totalSeconds) {
        playTone(520, 0.12);
        setTimeout(() => playTone(660, 0.12), 150);
      }

      timerMessageEl.textContent = "Jobb rolig og effektivt.";
      timerSubmessageEl.textContent = "Følg sjekklisten. Stå klar når du er ferdig.";

      intervalId = setInterval(() => {
        remainingSeconds--;
        renderTimer();

        if (remainingSeconds === 30) {
          playTone(440, 0.16);
          timerMessageEl.textContent = "30 sekunder igjen.";
        }

        if (remainingSeconds <= 0) {
          finishTimer();
        }
      }, 1000);
    }

    function stopTimer() {
      if (intervalId) {
        clearInterval(intervalId);
        intervalId = null;
      }
    }

    function pauseTimer() {
      stopTimer();
      timerMessageEl.textContent = "Pause.";
      timerSubmessageEl.textContent = "Trykk Start for å fortsette.";
    }

    function resetTimer() {
      stopTimer();
      remainingSeconds = totalSeconds;
      timerMessageEl.textContent = "Gjør deg klar.";
      timerSubmessageEl.textContent = "Når du er ferdig: stå rolig bak pulten.";
      finishedCard.classList.remove("visible");
      checklistCard.classList.remove("hidden");
      renderTimer();
    }

    function finishTimer() {
      stopTimer();
      remainingSeconds = 0;
      renderTimer();
      playEndSound();
      timerLabelEl.textContent = "Tiden er ute";
      timerMessageEl.textContent = "Stå klar bak pulten.";
      timerSubmessageEl.textContent = "Vent rolig på siste beskjed.";
      finishedCard.classList.add("visible");
    }

    function unlockAudio() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioContext.state === "suspended") {
        audioContext.resume();
      }
    }

    function playTone(frequency = 520, duration = 0.15) {
      if (!soundOn) return;
      unlockAudio();
      const oscillator = audioContext.createOscillator();
      const gain = audioContext.createGain();
      oscillator.type = "sine";
      oscillator.frequency.value = frequency;
      gain.gain.setValueAtTime(0.0001, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.11, audioContext.currentTime + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + duration);
      oscillator.connect(gain);
      gain.connect(audioContext.destination);
      oscillator.start();
      oscillator.stop(audioContext.currentTime + duration + 0.02);
    }

    function playEndSound() {
      playTone(660, 0.14);
      setTimeout(() => playTone(550, 0.14), 170);
      setTimeout(() => playTone(440, 0.22), 340);
    }

    async function toggleFullscreen() {
      if (!document.fullscreenElement) {
        await document.documentElement.requestFullscreen();
        fullscreenBtn.textContent = "Avslutt fullskjerm";
      } else {
        await document.exitFullscreen();
        fullscreenBtn.textContent = "Fullskjerm";
      }
    }

    modeButtons.forEach(btn => {
      btn.addEventListener("click", () => setMode(btn.dataset.mode));
    });

    startBtn.addEventListener("click", startTimer);
    pauseBtn.addEventListener("click", pauseTimer);
    resetBtn.addEventListener("click", resetTimer);
    fullscreenBtn.addEventListener("click", toggleFullscreen);

    soundBtn.addEventListener("click", () => {
      soundOn = !soundOn;
      soundBtn.textContent = soundOn ? "Lyd på" : "Lyd av";
      if (soundOn) playTone(520, 0.12);
    });

    document.addEventListener("keydown", (event) => {
      const skriverIBeskjedfelt = event.target === messageInput;
      if (skriverIBeskjedfelt) return;

      if (event.code === "Space") {
        event.preventDefault();
        intervalId ? pauseTimer() : startTimer();
      }
      if (event.key.toLowerCase() === "r") resetTimer();
      if (event.key.toLowerCase() === "f") toggleFullscreen();
      if (event.key === "1") setMode("normal");
      if (event.key === "2") setMode("quick");
      if (event.key === "3") setMode("careful");
    });

    setMode("normal");
  </script>
</body>
</html>
